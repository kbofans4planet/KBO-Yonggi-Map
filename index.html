<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>야구장 용기낼지도</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .neon-border { box-shadow: 0 0 10px rgba(34, 197, 94, 0.5); }
  </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen font-sans">

  <div id="init-loader" class="fixed inset-0 bg-slate-950 z-50 flex flex-col items-center justify-center">
    <i class="fa-solid fa-circle-notch fa-spin text-5xl text-green-400 mb-4"></i>
    <p class="text-lg font-bold text-green-400">데이터 불러오는 중...</p>
  </div>

  <div id="view-welcome" class="hidden max-w-md mx-auto px-4 py-8">
    <div class="text-center my-6">
      <h1 class="text-3xl font-black text-white">야구장 <span class="text-green-400">용기낼지도</span></h1>
    </div>
    <form id="welcome-form" class="space-y-4 bg-slate-800/50 p-5 rounded-2xl border border-slate-700/50">
      <select id="user-stadium" required class="w-full bg-slate-950 border border-slate-700 rounded-xl px-3 py-2.5 text-sm text-white">
        <option value="">방문 구장을 선택하세요</option>
        <option value="잠실야구장">잠실야구장</option>
        <option value="사직야구장">사직야구장</option>
        <option value="광주-기아챔피언스필드">광주-기아챔피언스필드</option>
      </select>
      <button type="submit" class="w-full bg-green-500 text-slate-950 font-bold rounded-xl py-3">매장 보기</button>
    </form>
  </div>

  <div id="view-main" class="hidden max-w-md mx-auto px-4 py-6">
    <h2 id="current-stadium-title" class="text-xl font-black text-white mb-4"></h2>
    <div id="store-list-container" class="space-y-3.5"></div>
  </div>

  <script>
    // 본인의 GAS 웹앱 주소로 교체하세요
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwjJQR0JCRrGIBEUY-Mj6Y0ipoeGclubZ6hSZpsRbXwM_rgGs0W_5bj0OqtDMx2aTs19g/exec";
    let allStores = [];

    window.addEventListener("DOMContentLoaded", async () => {
      await fetchInitialData();
      document.getElementById("welcome-form").addEventListener("submit", (e) => {
        e.preventDefault();
        showMainView(document.getElementById("user-stadium").value);
      });
    });

    async function fetchInitialData() {
      try {
        const response = await fetch(GAS_WEB_APP_URL);
        const data = await response.json();
        if (data.status === "success") {
          allStores = data.stores;
        }
      } catch (err) { console.error("데이터 로드 실패:", err); }
      finally { document.getElementById("init-loader").classList.add("hidden"); }
    }

    function showMainView(stadium) {
      document.getElementById("view-welcome").classList.add("hidden");
      document.getElementById("view-main").classList.remove("hidden");
      document.getElementById("current-stadium-title").innerText = stadium;
      
      const container = document.getElementById("store-list-container");
      const filtered = allStores.filter(s => s["야구장"] === stadium);
      
      container.innerHTML = filtered.map(s => `
        <div class="bg-slate-850 p-4 rounded-2xl border border-slate-800">
          <h4 class="text-base font-bold text-white">${s["매장명"]}</h4>
          <p class="text-xs text-slate-400">메뉴: ${s["주요 메뉴"] || '정보 없음'}</p>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
