  <script>
      const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyP2KCvfuapwwP2em7xULPtyoAaI93phj28Mg19sDqdAu3-RWKcDAhP8nabINnH4nHN/exec";
      let allStores = [];
      let selectedStadium = "";
      const teamEmojis = {
        "KIA 타이거즈": "🐯", "KT 위즈": "🧙", "LG 트윈스": "♊", "NC 다이노스": "🦖",
        "SSG 랜더스": "🐶", "두산 베어스": "🐻", "롯데 자이언츠": "🏖️",
        "삼성 라이온즈": "🦁", "키움 히어로즈": "🦸", "한화 이글스": "🦅"
      };
  
      // 1. 초기 데이터 불러오기
      async function fetchInitialData() {
          try {
              const response = await fetch(GAS_WEB_APP_URL);
              const data = await response.json();
              if (data.status === "success") {
                  allStores = data.stores;
                  renderTopTeams(data.topTeams);
              }
          } catch (err) {
              console.error("데이터 로드 실패:", err);
          }
      }
  
      // 2. 페이지 초기화 함수
      async function init() {
          const todayStr = new Date().toISOString().split('T')[0];
          const lastAuthDate = localStorage.getItem("last_auth_date");
      
          // 만약 날짜가 바뀌었다면 기존 인증 기록을 삭제
          if (lastAuthDate && lastAuthDate !== todayStr) {
              localStorage.removeItem("last_auth_date");
              // 필요하다면 아래 항목들도 삭제 가능
              localStorage.removeItem("user_team");
              localStorage.removeItem("user_stadium");
              localStorage.removeItem("user_name");
              localStorage.removeItem("user_phone");
          }
          // 전화번호 숫자만 입력되게 설정
          document.getElementById("user-phone").addEventListener("input", (e) => {
              e.target.value = e.target.value.replace(/[^0-9]/g, '');
          });
  
          // 데이터 먼저 로드
          await fetchInitialData();
  
          // 로딩 화면 숨김
          document.getElementById("init-loader").classList.add("hidden");
          
          // 항상 환영 페이지 노출
          document.getElementById("view-welcome").classList.remove("hidden");
  
          // 로컬 데이터 복구
          if (localStorage.getItem("user_team")) document.getElementById("user-team").value = localStorage.getItem("user_team");
          if (localStorage.getItem("user_stadium")) document.getElementById("user-stadium").value = localStorage.getItem("user_stadium");
          if (localStorage.getItem("user_name")) document.getElementById("user-name").value = localStorage.getItem("user_name");
          if (localStorage.getItem("user_phone")) document.getElementById("user-phone").value = localStorage.getItem("user_phone");

    document.getElementById("welcome-form").addEventListener("submit", async (e) => {

        // 오늘 이미 인증했고, 정보가 같다면 서버 전송 건너뜀

            const response = await fetch(GAS_WEB_APP_URL, {
                method: "POST",

            });

    function renderStoreList() {

      const floorFilter = document.getElementById("filter-floor").value;
      const zoneFilter = document.getElementById("filter-zone").value;
      const containerFilter = document.getElementById("filter-container-type").value;
      let filtered = allStores.filter(s => s["야구장"] === selectedStadium);
      if (floorFilter) filtered = filtered.filter(s => String(s["층수"]).includes(floorFilter));
      if (zoneFilter) filtered = filtered.filter(s => String(s["구역"]).includes(zoneFilter));
      if (containerFilter) {
        if (containerFilter === "cup") {
          filtered = filtered.filter(s => s["다회용컵 사용 여부"] === "사용");
        } else if (containerFilter === "dish") {
          filtered = filtered.filter(s => s["다회용그릇 사용 여부"] === "사용");
        } else if (containerFilter === "self") {
          filtered = filtered.filter(s => s["개인용기 사용 가능 여부"] === "가능");
        }
      }
      if (searchKeyword) {
        filtered = filtered.filter(s => 
          String(s["매장명"]).toLowerCase().includes(searchKeyword) || 
          String(s["주요 메뉴"]).toLowerCase().includes(searchKeyword)
        );
      }
      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="text-center py-12 text-slate-500 bg-slate-850 rounded-2xl border border-dashed border-slate-800">
            <i class="fa-solid fa-store-slash text-3xl mb-3"></i>
            <p class="text-xs">조건에 맞는 다회용기 매장이 없습니다.</p>
          </div>`;
        return;

      // renderStoreList 함수 내의 map 함수 부분을 수정합니다.
      container.innerHTML = filtered.map(s => {
        const cupBadge = s["다회용컵 사용 여부"] === "사용" ? `<span class="bg-blue-500/10 text-blue-400 border border-blue-500/20 text-[12px] px-1.5 py-0.5 rounded-md font-medium">🥤 다회용컵</span>` : '';
        const dishBadge = s["다회용그릇 사용 여부"] === "사용" ? `<span class="bg-indigo-500/10 text-indigo-400 border border-indigo-500/20 text-[12px] px-1.5 py-0.5 rounded-md font-medium">🍲 다회용그릇</span>` : '';
        const selfBadge = s["개인용기 사용 가능 여부"] === "가능" ? `<span class="bg-green-500/10 text-green-400 border border-green-500/20 text-[12px] px-1.5 py-0.5 rounded-md font-medium">🛍️ 개인용기 환영</span>` : '';
        
        // ... map 함수 내부 ...
        return `
          <div onclick="showReviewListModal('${s["매장일련번호"]}', '${s["매장명"]}')" 
               class="bg-slate-850 border border-slate-800 rounded-2xl p-4 cursor-pointer transition-all hover:border-slate-500 group">
              
              <div class="flex justify-between items-center mb-3">
                  <span class="text-[11px] font-bold text-slate-400 bg-slate-950 px-2 py-1 rounded-md">
                      📍 ${s["층수"]} | ${s["구역"]} (${s["인근 블록"]})
                  </span>
                  <div class="flex gap-1.5" onclick="event.stopPropagation()"> 
                      <button onclick="openReviewModal('${s["매장일련번호"]}', '${s["매장명"]}')" 
                              class="text-[11px] font-bold text-sky-400 bg-sky-500/10 px-2 py-1 rounded-md border border-sky-500/20 cursor-pointer hover:bg-sky-500/20 transition-all">
                          <i class="fa-solid fa-comment-dots mr-1"></i> 후기
                      </button>
                      
                      <button onclick="openReportModal('${s["매장일련번호"]}', '${s["매장명"]}')" 
                              class="text-[11px] font-bold text-emerald-400 bg-emerald-500/10 px-2 py-1 rounded-md border border-emerald-500/20 cursor-pointer hover:bg-emerald-500/20 transition-all">
                          <i class="fa-solid fa-circle-info mr-1"></i> 제보
                      </button>
                  </div> 
              </div>
              
              <div>
                  <h4 class="text-lg font-bold text-white mb-1">${s["매장명"]}</h4>
                  <p class="text-xs text-slate-400 mb-3">${s["주요 메뉴"]}</p>
                  <div class="flex flex-wrap gap-1.5">
                      ${cupBadge} ${dishBadge} ${selfBadge}
                  </div>
              </div>
           </div>
        `;
      }).join('');
    }
    window.openReportModal = function(serialNum, storeName) {
      document.getElementById("modal-serial-number").value = serialNum;
      // 여기서 제목 텍스트를 구성하는 부분을 수정합니다.
      const titleElement = document.querySelector("#report-modal h3"); // 모달 안의 h3 선택
      titleElement.innerText = `${storeName} 정보 제보 / 수정 요청`;
      document.getElementById("modal-store-name").innerText = `${storeName} 관련 정보 제보`;
      document.getElementById("report-modal").classList.remove("hidden");
    }
    document.getElementById("btn-close-modal").addEventListener("click", closeModal);
    function closeModal() {
      document.getElementById("report-modal").classList.add("hidden");
      document.getElementById("report-form").reset();
    }
    document.getElementById("report-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const btn = document.getElementById("btn-submit-report");
      const btnText = document.getElementById("btn-text-report");
      btn.disabled = true;
      btnText.innerText = "잠시만 기다려 주세요...";
      const serialNumber = document.getElementById("modal-serial-number").value;
      const storeName = document.getElementById("modal-store-name").innerText.replace(" 관련 정보 제보", "");
      const reportType = document.querySelector('input[name="report-type"]:checked').value;
      const message = document.getElementById("report-message").value;
      const fileInput = document.getElementById("report-file");
      let imageData = "";
      let imageName = "";
      if (fileInput.files.length > 0) {
        const file = fileInput.files[0];
        imageName = file.name;
        try {
          imageData = await resizeAndConvertImage(file);
        } catch (err) {
          console.error(err);
          alert("이미지 압축 실패");
          btn.disabled = false;
          btnText.innerText = "제보 등록하기";
          return;
        }
      }
      const payload = { action: "report", serialNumber, storeName, reportType, message, imageData, imageName };
      try {
        const response = await fetch(GAS_WEB_APP_URL, {
          method: "POST",
          body: JSON.stringify(payload)
        });
        const result = await response.json();
        if (result.status === "success") {
          alert("제보가 성공적으로 접수되었습니다! 🌱");
          closeModal();
        } else {
          alert("제보 등록 실패: " + result.message);
        }
      } catch (err) {
        console.error(err);
        alert("제보 처리가 완료되었습니다. 관리자 확인 후 반영됩니다! 🌱");
        closeModal();
      } finally {
        btn.disabled = false;
        btnText.innerText = "제보 등록하기";
      }
    });
    function resizeAndConvertImage(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = function (event) {
          const img = new Image();
          img.src = event.target.result;
          img.onload = function () {
            const canvas = document.createElement("canvas");
            const max_size = 600;
            let width = img.width;
            let height = img.height;
            if (width > height) {
              if (width > max_size) { height *= max_size / width; width = max_size; }
            } else {
              if (height > max_size) { width *= max_size / height; height = max_size; }
            }
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext("2d");
            ctx.drawImage(img, 0, 0, width, height);
            resolve(canvas.toDataURL("image/jpeg", 0.7));
          };
        };
        reader.onerror = error => reject(error);
      });
    }

// 후기 보기 버튼 클릭 시 실행될 함수
// 전역 변수 (함수 밖에 선언하세요)
let allReviews = [];
let currentReviewCount = 5;

async function showReviewListModal(serial, storeName) {
    document.getElementById("list-modal-title").innerText = `${storeName} 후기`;
    const container = document.getElementById("review-list-container");
    container.innerHTML = "불러오는 중...";
    document.getElementById("review-list-modal").classList.remove("hidden");

    // 1. 데이터 가져오기
    try {
        const response = await fetch(`${GAS_WEB_APP_URL}?action=getReviews&serial=${serial}`);
        allReviews = await response.json(); // 데이터를 전역 변수에 저장
        currentReviewCount = 5; // 모달 열 때마다 5개로 초기화
        
        renderReviews(); // 화면 그리는 함수 호출
    } catch (e) {
        container.innerHTML = "후기를 불러오지 못했습니다.";
    }
}

// 화면을 그려주는 함수 (따로 밖으로 빼세요)
function renderReviews() {
    const container = document.getElementById("review-list-container");
    const moreBtn = document.getElementById("btn-load-more"); // HTML에 더보기 버튼 id가 있어야 함
    
    if (allReviews.length === 0) {
        container.innerHTML = "<p class='text-slate-500 text-sm text-center'>아직 작성된 후기가 없어요!</p>";
        moreBtn.classList.add("hidden");
        return;
    }

    // 5개씩 슬라이싱
    const displayedReviews = allReviews.slice(0, currentReviewCount);
    
    container.innerHTML = displayedReviews.map(r => {
        let photoButton = '';
        if (r.photoUrl && r.photoUrl.length > 10) { 
            photoButton = `
                <button onclick="window.open('${r.photoUrl}', '_blank')" 
                        class="ml-2 text-[10px] bg-slate-700 text-white px-2 py-1 rounded-md hover:bg-slate-600 transition-all shrink-0">
                    📸 사진
                </button>`;
        }
        return `
            <div class="bg-slate-900 p-3 rounded-xl border border-slate-700 flex justify-between items-start mb-2">
                <div class="flex-1">
                    <p class="text-[10px] text-green-400 font-bold mb-1">${teamEmojis[r.team] || "⚾"} ${r.team}</p>
                    <p class="text-sm text-white">${r.message}</p>
                </div>
                ${photoButton}
            </div>
        `;
    }).join('');

    // 더보기 버튼 처리
    if (currentReviewCount >= allReviews.length) {
        moreBtn.classList.add("hidden");
    } else {
        moreBtn.classList.remove("hidden");
    }
}

// 더보기 버튼 클릭 함수
window.loadMoreReviews = function() {
    currentReviewCount += 5;
    renderReviews();
};
    // 후기 작성 모달 열기

// 후기 작성 모달 닫기
function closeReviewModal() {
    document.getElementById("review-modal").classList.add("hidden");
    document.getElementById("review-form").reset();
    document.getElementById("btn-text-review").innerText = "후기 등록하기";
    document.getElementById("btn-submit-review").disabled = false;
}

// 후기 제출 로직 (제보와 유사하게 구성)
document.getElementById("review-form").addEventListener("submit", async (e) => {
    e.preventDefault();
    
    const team = localStorage.getItem("user_team") || "알 수 없음";
    const serial = document.getElementById("review-serial-number").value;
    // 후기 제출 로직에서 매장명 가져오는 부분도 아래처럼 고치면 깔끔합니다.
    const storeName = document.getElementById("review-store-name-hidden").value;
    const message = document.getElementById("review-message").value; // 이 줄을 반드시 추가하세요! 
    const fileInput = document.getElementById("review-file"); // ★ 여기 선언이 필수입니다!
    const btn = document.getElementById("btn-submit-review");
    const btnText = document.getElementById("btn-text-review");
    
    btn.disabled = true;
    btnText.innerText = "등록 중...";

    let photoUrl = "";
    if (fileInput.files.length > 0) {
        try {
            photoUrl = await resizeAndConvertImage(fileInput.files[0]);
        } catch (err) {
            alert("이미지 처리 실패");
            btn.disabled = false;
            btnText.innerText = "후기 등록하기";
            return;
        }
    }

    const payload = { action: "addReview", serial, storeName, message, team, photoUrl };

    try {
        await fetch(GAS_WEB_APP_URL, { method: "POST", body: JSON.stringify(payload) });
        alert("소중한 후기가 등록되었습니다! 🌱");
        closeReviewModal();
    } catch (err) {
        alert("등록 중 오류가 발생했습니다.");
    } finally {
        btn.disabled = false;
        btnText.innerText = "후기 등록하기";
    }
});
window.openImage = function(url) {

    } else {

};
