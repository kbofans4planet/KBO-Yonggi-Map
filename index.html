<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>야구장 용기낼지도</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

  <div id="init-loader" class="fixed inset-0 bg-slate-950 z-50 flex flex-col items-center justify-center">
    <i class="fa-solid fa-circle-notch fa-spin text-5xl text-green-400 mb-4"></i>
    <p class="text-green-400 font-bold">데이터 불러오는 중...</p>
  </div>

  <div class="max-w-md mx-auto p-4">
    <div id="view-welcome">
      <h1 class="text-3xl font-black text-center my-8 text-white">야구장 <span class="text-green-400">용기낼지도</span></h1>
      <form id="welcome-form" class="bg-slate-800 p-6 rounded-2xl space-y-4">
        <select id="user-stadium" required class="w-full bg-slate-950 p-3 rounded-xl border border-slate-700 text-white">
          <option value="">구장을 선택하세요</option>
          <option value="잠실야구장">잠실야구장</option>
          <option value="사직야구장">사직야구장</option>
          <option value="광주-기아챔피언스필드">광주-기아챔피언스필드</option>
        </select>
        <button type="submit" class="w-full bg-green-500 text-slate-900 font-bold py-3 rounded-xl">입장하기</button>
      </form>
    </div>

    <div id="view-main" class="hidden">
      <h2 id="current-stadium-title" class="text-xl font-bold mb-4 text-white"></h2>
      <div id="store-list-container" class="space-y-4"></div>
      
      <div class="mt-8 p-4 bg-slate-800 rounded-2xl border border-slate-700">
        <h3 class="font-bold mb-2 text-green-400">매장 제보하기</h3>
        <input type="text" id="report-name" placeholder="매장명" class="w-full bg-slate-950 p-2 mb-2 rounded border border-slate-600">
        <input type="file" id="report-file" class="text-sm mb-2 w-full">
        <button onclick="submitReport()" class="w-full bg-green-600 py-2 rounded-xl font-bold text-white">제보 전송</button>
      </div>
    </div>
  </div>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwjJQR0JCRrGIBEUY-Mj6Y0ipoeGclubZ6hSZpsRbXwM_rgGs0W_5bj0OqtDMx2aTs19g/exec";
    let allStores = [];

    // 데이터 로드
    async function fetchInitialData() {
      try {
        const res = await fetch(GAS_URL);
        const data = await res.json();
        allStores = data.stores;
        document.getElementById("init-loader").classList.add("hidden");
      } catch (err) { alert("데이터 로드 실패"); }
    }

    // 제보 전송 함수
    async function submitReport() {
      const fileInput = document.getElementById('report-file');
      const file = fileInput.files[0];
      const reader = new FileReader();

      reader.onload = async function(e) {
        const payload = {
          action: "report",
          storeName: document.getElementById('report-name').value,
          imageData: e.target.result,
          imageName: file ? file.name : "no-image.png",
          reportType: "직접 제보",
          message: "사용자 제보입니다."
        };

        const res = await fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify(payload)
        });
        alert("제보가 전송되었습니다!");
      };
      if(file) reader.readAsDataURL(file);
      else reader.onload(); // 파일 없어도 전송
    }

    document.getElementById("welcome-form").addEventListener("submit", (e) => {
      e.preventDefault();
      const stadium = document.getElementById("user-stadium").value;
      document.getElementById("view-welcome").classList.add("hidden");
      document.getElementById("view-main").classList.remove("hidden");
      document.getElementById("current-stadium-title").innerText = stadium;
      
      const container = document.getElementById("store-list-container");
      container.innerHTML = allStores.filter(s => s["야구장"] === stadium).map(s => `
        <div class="bg-slate-800 p-4 rounded-xl border border-slate-700">
          <h4 class="font-bold text-white">${s["매장명"]}</h4>
          <p class="text-xs text-slate-400">메뉴: ${s["주요 메뉴"]}</p>
        </div>
      `).join('');
    });

    fetchInitialData();
  </script>
</body>
</html>
